<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Trại Cai Nghiện KPI</title>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      font-family: Arial, sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e293b,
          #334155
        );

      color: white;

      min-height: 100vh;

    }

    .container {

      width: 100%;
      max-width: 900px;

      margin: auto;

      padding: 20px;

    }

    .center {

      display: flex;

      justify-content: center;
      align-items: center;

      min-height: 100vh;

    }

    .menu {

      width: 100%;

      display: flex;
      flex-direction: column;

      gap: 20px;

    }

    .card {

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.1);

      border-radius: 20px;

      padding: 25px;

      backdrop-filter: blur(12px);

    }

    .title {

      text-align: center;

      margin-bottom: 20px;

    }

    .title h1 {

      margin: 0;

      font-size: 42px;

    }

    .title p {

      color: #cbd5e1;

    }

    .option-grid {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 20px;

    }

    .option-card h2 {

      margin-top: 0;

    }

    .option-card p {

      color: #cbd5e1;

    }

    .btn {

      width: 100%;

      border: none;

      background: #22c55e;

      color: white;

      padding: 14px;

      border-radius: 12px;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

    }

    .btn:hover {

      transform: translateY(-2px);

      opacity: 0.9;

    }

    input[type=file] {

      margin-top: 10px;

      width: 100%;

      color: white;

    }

    .quiz {

      display: none;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 20px;

      gap: 10px;

      flex-wrap: wrap;

    }

    .badge {

      background: rgba(255,255,255,0.1);

      padding: 10px 14px;

      border-radius: 999px;

      font-size: 14px;

    }

    .question {

      font-size: 28px;

      line-height: 1.6;

      margin-bottom: 25px;

    }

    .answer {

      width: 100%;

      background: rgba(255,255,255,0.06);

      border: 1px solid rgba(255,255,255,0.08);

      color: white;

      padding: 18px;

      border-radius: 14px;

      margin-bottom: 15px;

      text-align: left;

      cursor: pointer;

      font-size: 16px;

      transition: 0.2s;

    }

    .answer:hover {

      background: rgba(255,255,255,0.12);

    }

    .correct {

      background: rgba(34,197,94,0.35);

      border-color: #22c55e;

    }

    .wrong {

      background: rgba(239,68,68,0.35);

      border-color: #ef4444;

    }

    .hint {

      display: none;

      margin-top: 20px;

      padding: 18px;

      border-radius: 14px;

      background: rgba(255,255,255,0.06);

      line-height: 1.8;

    }

    @media(max-width: 700px) {

      .option-grid {

        grid-template-columns: 1fr;

      }

      .title h1 {

        font-size: 32px;

      }

      .question {

        font-size: 22px;

      }

    }

  </style>

</head>

<body>

  <!-- ====================== -->
  <!-- MENU -->
  <!-- ====================== -->

  <div
    class="container center"
    id="menuPage"
  >

    <div class="menu">

      <div class="title">

        <h1>
          💀 TRẠI CAI NGHIỆN KPI
        </h1>

        <p>
          Học hôm nay để mai đỡ bị khách combat.
        </p>

      </div>

      <div class="option-grid">

        <div class="card option-card">

          <h2>
            📚 Dùng đề có sẵn
          </h2>

          <p>
            Tự load file
            <b>data.xlsx</b>
          </p>

          <button
            class="btn"
            onclick="loadDefaultExcel()"
          >
            Bắt đầu cày
          </button>

        </div>

        <div class="card option-card">

          <h2>
            📤 Upload file riêng
          </h2>

          <p>
            Upload file excel của bạn.
          </p>

          <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls"
          >

        </div>

      </div>

    </div>

  </div>

  <!-- ====================== -->
  <!-- QUIZ -->
  <!-- ====================== -->

  <div
    class="container quiz"
    id="quizPage"
  >

    <div class="card">

      <div class="topbar">

        <div class="badge" id="counter">
          Câu 1
        </div>

        <div class="badge" id="timer">
          00:00
        </div>

        <button
          class="btn"
          style="width:auto;padding:10px 16px;background:#ef4444"
          onclick="exitQuiz()"
        >
          Thoát
        </button>

      </div>

      <div
        class="question"
        id="question"
      ></div>

      <div id="answers"></div>

      <div
        class="hint"
        id="hint"
      ></div>

    </div>

  </div>

  <script>

    let questions = [];

    let current = 0;

    let timerInterval;

    let seconds = 0;

    // ======================
    // SHUFFLE
    // ======================

    function shuffle(array) {

      for (
        let i = array.length - 1;
        i > 0;
        i--
      ) {

        const j =
          Math.floor(
            Math.random() * (i + 1)
          );

        [array[i], array[j]] =
          [array[j], array[i]];

      }

    }

    // ======================
    // TIMER
    // ======================

    function startTimer() {

      clearInterval(timerInterval);

      seconds = 0;

      timerInterval =
        setInterval(() => {

          seconds++;

          const m =
            String(
              Math.floor(seconds / 60)
            ).padStart(2, '0');

          const s =
            String(
              seconds % 60
            ).padStart(2, '0');

          document
            .getElementById('timer')
            .innerText =
            `${m}:${s}`;

        }, 1000);

    }

    // ======================
    // EXIT
    // ======================

    function exitQuiz() {

      clearInterval(timerInterval);

      document
        .getElementById('quizPage')
        .style.display = 'none';

      document
        .getElementById('menuPage')
        .style.display = 'flex';

    }

    // ======================
    // LOAD DEFAULT
    // ======================

    async function loadDefaultExcel() {

      const response =
        await fetch('./data.xlsx');

      const arrayBuffer =
        await response.arrayBuffer();

      parseExcel(arrayBuffer);

    }

    // ======================
    // UPLOAD FILE
    // ======================

    document
      .getElementById('excelFile')
      .addEventListener('change', async (e) => {

        const file =
          e.target.files[0];

        const arrayBuffer =
          await file.arrayBuffer();

        parseExcel(arrayBuffer);

      });

    // ======================
    // PARSE EXCEL
    // ======================

    function parseExcel(arrayBuffer) {

      const workbook =
        XLSX.read(arrayBuffer);

      const sheet =
        workbook.Sheets[
          workbook.SheetNames[0]
        ];

      const json =
        XLSX.utils.sheet_to_json(
          sheet,
          { defval: '' }
        );

      let category =
        'Chưa phân loại';

      questions = [];

      json.forEach(row => {

        // Dòng category

        if (
          row['STT']
          &&
          typeof row['STT'] === 'string'
          &&
          !row['ĐÁP ÁN 1']
        ) {

          category =
            row['CÂU HỎI'];

          return;

        }

        // Dòng câu hỏi

        if (
          row['CÂU HỎI']
          &&
          row['ĐÁP ÁN ĐÚNG']
        ) {

          questions.push({

            question:
              row['CÂU HỎI'],

            answers: [

              row['ĐÁP ÁN 1'],
              row['ĐÁP ÁN 2'],
              row['ĐÁP ÁN 3'],
              row['ĐÁP ÁN 4']

            ].filter(Boolean),

            correct:
              Number(
                row['ĐÁP ÁN ĐÚNG']
              ) - 1,

            source:
              row['TRÍCH DẪN NGUỒN CÂU HỎI']
              || 'Không có nguồn',

            category

          });

        }

      });

      // XÁO ĐỀ

      shuffle(questions);

      current = 0;

      document
        .getElementById('menuPage')
        .style.display = 'none';

      document
        .getElementById('quizPage')
        .style.display = 'block';

      startTimer();

      showQuestion();

    }

    // ======================
    // SHOW QUESTION
    // ======================

    function showQuestion() {

      const q =
        questions[current];

      document
        .getElementById('counter')
        .innerText =
        `Câu ${current + 1}/${questions.length}`;

      document
        .getElementById('question')
        .innerText =
        q.question;

      document
        .getElementById('hint')
        .style.display =
        'none';

      const answersDiv =
        document
          .getElementById('answers');

      answersDiv.innerHTML = '';

      q.answers.forEach((answer, index) => {

        const btn =
          document.createElement('button');

        btn.className =
          'answer';

        btn.innerText =
          `${String.fromCharCode(65 + index)}. ${answer}`;

        btn.onclick =
          () => checkAnswer(index);

        answersDiv.appendChild(btn);

      });

    }

    // ======================
    // CHECK ANSWER
    // ======================

    function checkAnswer(index) {

      const q =
        questions[current];

      const buttons =
        document
          .querySelectorAll('.answer');

      buttons.forEach((btn, i) => {

        btn.disabled = true;

        if (i === q.correct) {

          btn.classList.add('correct');

        }

        if (
          i === index
          &&
          i !== q.correct
        ) {

          btn.classList.add('wrong');

        }

      });

      const hint =
        document
          .getElementById('hint');

      hint.style.display =
        'block';

      hint.innerHTML = `

        <b>
          ${index === q.correct
            ? '✅ Đúng rồi đồng chí'
            : '❌ Sai rồi chiến hữu'}
        </b>

        <br><br>

        📖 ${q.source}

      `;

      // AUTO NEXT

      setTimeout(() => {

        nextQuestion();

      }, 1800);

    }

    // ======================
    // NEXT
    // ======================

    function nextQuestion() {

      current++;

      if (current >= questions.length) {

        current = 0;

        shuffle(questions);

      }

      showQuestion();

    }

  </script>

</body>

</html>
