<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    💀 TRẠI KHỔ SAI TRI THỨC
  </title>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e293b,
          #334155
        );

      color: white;

      min-height: 100vh;

      overflow-x: hidden;

    }

    .container {

      width: 100%;
      max-width: 1000px;

      margin: auto;

      padding: 20px;

    }

    .center {

      display: flex;

      justify-content: center;
      align-items: center;

      min-height: 100vh;

    }

    .menu {

      width: 100%;

      display: flex;
      flex-direction: column;

      gap: 20px;

    }

    .title {

      text-align: center;

      margin-bottom: 10px;

    }

    .title h1 {

      margin: 0;

      font-size: 42px;

    }

    .title p {

      color: #cbd5e1;

    }

    .option-grid {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 20px;

    }

    .card {

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.1);

      border-radius: 20px;

      padding: 25px;

      backdrop-filter: blur(12px);

    }

    .option-card h2 {

      margin-top: 0;

    }

    .option-card p {

      color: #cbd5e1;

      line-height: 1.6;

    }

    .btn {

      width: 100%;

      border: none;

      background: #22c55e;

      color: white;

      padding: 14px;

      border-radius: 12px;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

    }

    .btn:hover {

      transform: translateY(-2px);

      opacity: 0.9;

    }

    .btn-secondary {

      background: #3b82f6;

    }

    .btn-danger {

      background: #ef4444;

    }

    .btn-warning {

      background: #f59e0b;

    }

    input[type=file] {

      margin-top: 10px;

      width: 100%;

      color: white;

    }

    .hidden {

      display: none !important;

    }

    .quiz {

      display: none;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 10px;

      flex-wrap: wrap;

      margin-bottom: 20px;

    }

    .badge {

      background: rgba(255,255,255,0.08);

      padding: 10px 16px;

      border-radius: 999px;

      font-size: 14px;

    }

    .question {

      font-size: 30px;

      line-height: 1.6;

      margin-bottom: 30px;

      font-weight: bold;

    }

    .answer {

      width: 100%;

      background: rgba(255,255,255,0.06);

      border: 1px solid rgba(255,255,255,0.08);

      color: white;

      padding: 18px;

      border-radius: 14px;

      margin-bottom: 15px;

      text-align: left;

      cursor: pointer;

      font-size: 16px;

      transition: 0.2s;

    }

    .answer:hover {

      background: rgba(255,255,255,0.12);

    }

    .correct {

      background: rgba(34,197,94,0.35);

      border-color: #22c55e;

    }

    .wrong {

      background: rgba(239,68,68,0.35);

      border-color: #ef4444;

    }

    .hint {

      display: none;

      margin-top: 20px;

      padding: 20px;

      border-radius: 14px;

      background: rgba(255,255,255,0.06);

      line-height: 1.8;

    }

    .nav-btn {

      position: fixed;

      top: 50%;

      transform: translateY(-50%);

      width: 60px;

      height: 60px;

      border-radius: 999px;

      border: none;

      font-size: 26px;

      cursor: pointer;

      z-index: 1000;

      color: white;

      background: rgba(0,0,0,0.5);

      backdrop-filter: blur(8px);

    }

    .nav-btn:hover {

      background: rgba(255,255,255,0.2);

    }

    .nav-left {

      left: 15px;

    }

    .nav-right {

      right: 15px;

    }

    .search-box {

      width: 100%;

      padding: 18px;

      border-radius: 14px;

      border: 1px solid rgba(255,255,255,0.1);

      background: rgba(255,255,255,0.06);

      color: white;

      font-size: 16px;

      outline: none;

      margin-bottom: 20px;

    }

    .search-result {

      background: rgba(255,255,255,0.05);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 16px;

      padding: 18px;

      margin-bottom: 15px;

    }

    .search-result h3 {

      margin-top: 0;

      line-height: 1.6;

    }

    .correct-answer {

      color: #4ade80;

      margin-top: 12px;

      font-weight: bold;

    }

    .detail {

      margin-top: 15px;

      color: #cbd5e1;

      line-height: 1.8;

    }

    .section-title {

      margin-bottom: 20px;

    }

    @media(max-width: 768px) {

      .option-grid {

        grid-template-columns: 1fr;

      }

      .title h1 {

        font-size: 32px;

      }

      .question {

        font-size: 24px;

      }

      .nav-btn {

        width: 50px;
        height: 50px;

        font-size: 22px;

      }

    }

  </style>

</head>

<body>

  <!-- ====================== -->
  <!-- MENU -->
  <!-- ====================== -->

  <div
    class="container center"
    id="menuPage"
  >

    <div class="menu">

      <div class="title">

        <h1>
          💀 TRẠI KHỔ SAI TRI THỨC
        </h1>

        <p>
          KPI chưa xong, học phần mới đã mở.
        </p>

      </div>

      <!-- MENU CHÍNH -->

      <div
        class="option-grid"
        id="mainOptions"
      >

        <div class="card option-card">

          <h2>
            📚 Dùng đề có sẵn
          </h2>

          <p>
            Hội thi Đại sứ Văn hóa 2026
          </p>

          <button
            class="btn"
            onclick="showDefaultModes()"
          >
            Bắt đầu cày
          </button>

        </div>

        <div class="card option-card">

          <h2>
            📤 Upload file riêng
          </h2>

          <p>
            Upload file excel của bạn
          </p>

          <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls"
          >

        </div>

      </div>

      <!-- MENU MODE -->

      <div
        id="defaultModes"
        class="hidden"
      >

        <div class="option-grid">

          <div class="card option-card">

            <h2>
              🔎 Tra cứu đề
            </h2>

            <p>
              Gõ keyword để tìm câu hỏi.
            </p>

            <button
              class="btn btn-secondary"
              onclick="startSearchMode()"
            >
              Mở tra cứu
            </button>

          </div>

          <div class="card option-card">

            <h2>
              🧠 Luyện tập đề
            </h2>

            <p>
              Chia bộ 50 câu.
            </p>

            <button
              class="btn"
              onclick="showPracticeSets()"
            >
              Vào luyện tập
            </button>

          </div>

        </div>

        <br>

        <button
          class="btn btn-danger"
          onclick="backToMainMenu()"
        >
          Quay lại
        </button>

      </div>

      <!-- BỘ ĐỀ -->

      <div
        id="practiceSets"
        class="hidden"
      >

        <div class="card">

          <h2 class="section-title">
            📦 Chọn bộ đề luyện tập
          </h2>

          <div
            class="option-grid"
            id="setsContainer"
          ></div>

          <br>

          <button
            class="btn btn-danger"
            onclick="backToModes()"
          >
            Quay lại
          </button>

        </div>

      </div>

      <!-- SEARCH -->

      <div
        id="searchMode"
        class="hidden"
      >

        <div class="card">

          <h2 class="section-title">
            🔎 Tra cứu câu hỏi
          </h2>

          <input
            type="text"
            class="search-box"
            id="searchInput"
            placeholder="Ví dụ: văn hóa doanh nghiệp, điều lệ, quy định..."
          >

          <div id="searchResults"></div>

          <br>

          <button
            class="btn btn-danger"
            onclick="backToModes()"
          >
            Quay lại
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- ====================== -->
  <!-- QUIZ -->
  <!-- ====================== -->

  <div
    class="container quiz"
    id="quizPage"
  >

    <button
      class="nav-btn nav-left"
      onclick="prevQuestion()"
    >
      ←
    </button>

    <button
      class="nav-btn nav-right"
      onclick="nextQuestion()"
    >
      →
    </button>

    <div class="card">

      <div class="topbar">

        <div
          class="badge"
          id="counter"
        >
          Câu 1
        </div>

        <div
          class="badge"
          id="timer"
        >
          00:00
        </div>

        <div
          class="badge"
          id="setName"
        >
          Bộ đề
        </div>

        <button
          class="btn btn-danger"
          style="width:auto;padding:10px 16px"
          onclick="exitQuiz()"
        >
          Thoát
        </button>

      </div>

      <div
        class="question"
        id="question"
      ></div>

      <div id="answers"></div>

      <div
        class="hint"
        id="hint"
      ></div>

    </div>

  </div>

  <script>

    let allQuestions = [];

    let questions = [];

    let current = 0;

    let timerInterval;

    let seconds = 0;

    let currentSetName = '';

    // ======================
    // SHUFFLE
    // ======================

    function shuffle(array) {

      for (
        let i = array.length - 1;
        i > 0;
        i--
      ) {

        const j =
          Math.floor(
            Math.random() * (i + 1)
          );

        [array[i], array[j]] =
          [array[j], array[i]];

      }

    }

    // ======================
    // TIMER
    // ======================

    function startTimer() {

      clearInterval(timerInterval);

      seconds = 0;

      timerInterval =
        setInterval(() => {

          seconds++;

          const m =
            String(
              Math.floor(seconds / 60)
            ).padStart(2, '0');

          const s =
            String(
              seconds % 60
            ).padStart(2, '0');

          document
            .getElementById('timer')
            .innerText =
            `${m}:${s}`;

        }, 1000);

    }

    // ======================
    // LOAD DEFAULT
    // ======================

    async function loadDefaultExcel() {

      const response =
        await fetch('./data.xlsx');

      const arrayBuffer =
        await response.arrayBuffer();

      parseExcel(arrayBuffer);

    }

    // ======================
    // MENU
    // ======================

    async function showDefaultModes() {

      if (allQuestions.length === 0) {

        await loadDefaultExcel();

      }

      document
        .getElementById('mainOptions')
        .classList.add('hidden');

      document
        .getElementById('defaultModes')
        .classList.remove('hidden');

    }

    function backToMainMenu() {

      document
        .getElementById('defaultModes')
        .classList.add('hidden');

      document
        .getElementById('practiceSets')
        .classList.add('hidden');

      document
        .getElementById('searchMode')
        .classList.add('hidden');

      document
        .getElementById('mainOptions')
        .classList.remove('hidden');

    }

    function backToModes() {

      document
        .getElementById('practiceSets')
        .classList.add('hidden');

      document
        .getElementById('searchMode')
        .classList.add('hidden');

      document
        .getElementById('defaultModes')
        .classList.remove('hidden');

    }

    // ======================
    // UPLOAD FILE
    // ======================

    document
      .getElementById('excelFile')
      .addEventListener('change', async (e) => {

        const file =
          e.target.files[0];

        const arrayBuffer =
          await file.arrayBuffer();

        parseExcel(arrayBuffer);

        alert(
          '✅ Load file thành công'
        );

      });

    // ======================
    // PARSE EXCEL
    // ======================

    function parseExcel(arrayBuffer) {

      const workbook =
        XLSX.read(arrayBuffer);

      const sheet =
        workbook.Sheets[
          workbook.SheetNames[0]
        ];

      const json =
        XLSX.utils.sheet_to_json(
          sheet,
          { defval: '' }
        );

      let category =
        'Chưa phân loại';

      allQuestions = [];

      json.forEach(row => {

        if (
          row['STT']
          &&
          typeof row['STT'] === 'string'
          &&
          !row['ĐÁP ÁN 1']
        ) {

          category =
            row['CÂU HỎI'];

          return;

        }

        if (
          row['CÂU HỎI']
          &&
          row['ĐÁP ÁN ĐÚNG']
        ) {

          const answers = [

            row['ĐÁP ÁN 1'],
            row['ĐÁP ÁN 2'],
            row['ĐÁP ÁN 3'],
            row['ĐÁP ÁN 4']

          ].filter(Boolean);

          const correctIndex =
            Number(
              row['ĐÁP ÁN ĐÚNG']
            ) - 1;

          allQuestions.push({

            question:
              row['CÂU HỎI'],

            answers,

            correct:
              correctIndex,

            correctText:
              answers[correctIndex],

            source:
              row['TRÍCH DẪN NGUỒN CÂU HỎI']
              || 'Không có nguồn',

            category

          });

        }

      });

      shuffle(allQuestions);

    }

    // ======================
    // CHIA BỘ ĐỀ
    // ======================

    function showPracticeSets() {

      document
        .getElementById('defaultModes')
        .classList.add('hidden');

      document
        .getElementById('practiceSets')
        .classList.remove('hidden');

      const container =
        document
          .getElementById('setsContainer');

      container.innerHTML = '';

      const total =
        allQuestions.length;

      const chunkSize = 50;

      const totalSets =
        Math.ceil(total / chunkSize);

      for (
        let i = 0;
        i < totalSets;
        i++
      ) {

        const start =
          i * chunkSize;

        const end =
          start + chunkSize;

        const setQuestions =
          allQuestions.slice(start, end);

        const div =
          document.createElement('div');

        div.className =
          'card';

        div.innerHTML = `

          <h2>
            📦 Bộ đề ${i + 1}
          </h2>

          <p>
            ${setQuestions.length} câu hỏi
          </p>

          <button
            class="btn"
            onclick="startPracticeSet(${i})"
          >
            Bắt đầu
          </button>

        `;

        container.appendChild(div);

      }

    }

    // ======================
    // START SET
    // ======================

    function startPracticeSet(index) {

      const chunkSize = 50;

      const start =
        index * chunkSize;

      const end =
        start + chunkSize;

      questions =
        allQuestions.slice(start, end);

      current = 0;

      currentSetName =
        `📦 Bộ đề ${index + 1}`;

      startQuiz();

    }

    // ======================
    // QUIZ START
    // ======================

    function startQuiz() {

      document
        .getElementById('menuPage')
        .style.display = 'none';

      document
        .getElementById('quizPage')
        .style.display = 'block';

      document
        .getElementById('setName')
        .innerText =
        currentSetName;

      startTimer();

      showQuestion();

    }

    // ======================
    // SHOW QUESTION
    // ======================

    function showQuestion() {

      const q =
        questions[current];

      document
        .getElementById('counter')
        .innerText =
        `Câu ${current + 1}/${questions.length}`;

      document
        .getElementById('question')
        .innerText =
        q.question;

      document
        .getElementById('hint')
        .style.display =
        'none';

      const answersDiv =
        document
          .getElementById('answers');

      answersDiv.innerHTML = '';

      q.answers.forEach((answer, index) => {

        const btn =
          document.createElement('button');

        btn.className =
          'answer';

        btn.innerText =
          `${String.fromCharCode(65 + index)}. ${answer}`;

        btn.onclick =
          () => checkAnswer(index);

        answersDiv.appendChild(btn);

      });

    }

    // ======================
    // CHECK ANSWER
    // ======================

    function checkAnswer(index) {

      const q =
        questions[current];

      const buttons =
        document
          .querySelectorAll('.answer');

      buttons.forEach((btn, i) => {

        btn.disabled = true;

        if (i === q.correct) {

          btn.classList.add('correct');

        }

        if (
          i === index
          &&
          i !== q.correct
        ) {

          btn.classList.add('wrong');

        }

      });

      const hint =
        document
          .getElementById('hint');

      hint.style.display =
        'block';

      hint.innerHTML = `

        <b>
          ${index === q.correct
            ? '✅ Đúng rồi đồng chí'
            : '❌ Sai rồi chiến hữu'}
        </b>

        <br><br>

        📖 ${q.source}

      `;

      // KHÔNG AUTO NEXT NỮA

    }

    // ======================
    // NEXT
    // ======================

    function nextQuestion() {

      current++;

      if (
        current >= questions.length
      ) {

        current =
          questions.length - 1;

      }

      showQuestion();

    }

    // ======================
    // PREV
    // ======================

    function prevQuestion() {

      current--;

      if (current < 0) {

        current = 0;

      }

      showQuestion();

    }

    // ======================
    // EXIT
    // ======================

    function exitQuiz() {

      clearInterval(timerInterval);

      document
        .getElementById('quizPage')
        .style.display = 'none';

      document
        .getElementById('menuPage')
        .style.display = 'flex';

    }

    // ======================
    // SEARCH MODE
    // ======================

    function startSearchMode() {

      document
        .getElementById('defaultModes')
        .classList.add('hidden');

      document
        .getElementById('searchMode')
        .classList.remove('hidden');

    }

    // ======================
    // FUZZY SEARCH
    // ======================

    function fuzzyMatch(text, keyword) {

      text =
        text.toLowerCase();

      keyword =
        keyword.toLowerCase();

      const words =
        keyword.split(' ');

      return words.every(
        word => text.includes(word)
      );

    }

    document
      .getElementById('searchInput')
      .addEventListener('input', (e) => {

        const keyword =
          e.target.value.trim();

        const resultsDiv =
          document
            .getElementById('searchResults');

        resultsDiv.innerHTML = '';

        if (
          keyword.length < 2
        ) {

          return;

        }

        const results =
          allQuestions.filter(q =>

            fuzzyMatch(
              q.question,
              keyword
            )

          );

        if (
          results.length === 0
        ) {

          resultsDiv.innerHTML = `

            <div class="search-result">

              Không tìm thấy kết quả nào 💀

            </div>

          `;

          return;

        }

        results.slice(0, 30)
          .forEach((q, idx) => {

          const div =
            document.createElement('div');

          div.className =
            'search-result';

          const isDesktop =
            window.innerWidth > 1000;

          div.innerHTML = `

            <h3>
              ${idx + 1}. ${q.question}
            </h3>

            <div class="correct-answer">

              ✅ Đáp án đúng:
              ${q.correctText}

            </div>

            ${
              isDesktop
              ? `
                <div class="detail">
                  📖 ${q.source}
                </div>
              `
              : `
                <button
                  class="btn btn-warning"
                  style="margin-top:15px"
                  onclick="toggleDetail(this)"
                >
                  Xem chi tiết
                </button>

                <div
                  class="detail hidden"
                >
                  📖 ${q.source}
                </div>
              `
            }

          `;

          resultsDiv.appendChild(div);

        });

      });

    // ======================
    // DETAIL
    // ======================

    function toggleDetail(btn) {

      const detail =
        btn.nextElementSibling;

      detail.classList.toggle('hidden');

      btn.innerText =
        detail.classList.contains('hidden')
        ? 'Xem chi tiết'
        : 'Ẩn chi tiết';

    }

  </script>

</body>

</html>
