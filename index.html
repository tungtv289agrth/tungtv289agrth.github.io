<style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;

        font-family: Arial, sans-serif;

        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);

        color: white;

        min-height: 100vh;

        overflow-x: hidden;
      }

      .container {
        width: 100%;
        max-width: 920px;

        margin: auto;

        padding: 14px;
      }

      .center {
        display: flex;

        justify-content: center;
        align-items: center;

        min-height: 100vh;
      }

      .menu {
        width: 100%;

        display: flex;
        flex-direction: column;

        gap: 20px;
      }

      .title {
        text-align: center;

        margin-bottom: 10px;
      }

      .title h1 {
        margin: 0;

        font-size: 42px;
      }

      .title p {
        color: #cbd5e1;
      }

      .option-grid {
        display: grid;

        grid-template-columns: 1fr 1fr;

        gap: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.08);

        border: 1px solid rgba(255, 255, 255, 0.1);

        border-radius: 20px;

        padding: 18px;

        backdrop-filter: blur(12px);
      }

      .option-card h2 {
        margin-top: 0;
      }

      .option-card p {
        color: #cbd5e1;

        line-height: 1.6;
      }

      .btn {
        width: 100%;

        border: none;

        background: #22c55e;

        color: white;

        padding: 14px;

        border-radius: 14px;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);

        opacity: 0.9;
      }

      .btn-secondary {
        background: #3b82f6;
      }

      .btn-danger {
        background: #ef4444;
      }

      .btn-warning {
        background: #f59e0b;
      }

      input[type="file"] {
        margin-top: 10px;

        width: 100%;

        color: white;
      }

      .hidden {
        display: none !important;
      }

      .quiz {
        display: none;

        padding-bottom: 120px;
      }

      .topbar {
        display: flex;

        justify-content: space-between;

        align-items: center;

        gap: 10px;

        flex-wrap: wrap;

        margin-bottom: 20px;
      }

      .badge {
        background: rgba(255, 255, 255, 0.08);

        padding: 8px 14px;

        border-radius: 999px;

        font-size: 13px;
      }

      .question {
        font-size: 24px;

        line-height: 1.5;

        margin-bottom: 18px;

        font-weight: bold;
      }

      .answer {
        width: 100%;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: white;

        padding: 14px 16px;

        border-radius: 16px;

        margin-bottom: 10px;

        text-align: left;

        cursor: pointer;

        font-size: 15px;

        line-height: 1.4;

        transition: 0.2s;
      }

      .answer:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .correct {
        background: rgba(34, 197, 94, 0.35);

        border-color: #22c55e;
      }

      .wrong {
        background: rgba(239, 68, 68, 0.35);

        border-color: #ef4444;
      }

      .hint {
        display: none;

        margin-top: 14px;

        padding: 14px;

        border-radius: 16px;

        background: rgba(255, 255, 255, 0.06);

        line-height: 1.6;

        font-size: 14px;
      }

      .search-box {
        width: 100%;

        padding: 18px;

        border-radius: 16px;

        border: 1px solid rgba(255, 255, 255, 0.1);

        background: rgba(255, 255, 255, 0.06);

        color: white;

        font-size: 16px;

        outline: none;

        margin-bottom: 20px;
      }

      .search-result {
        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 18px;

        padding: 18px;

        margin-bottom: 15px;
      }

      .search-result h3 {
        margin-top: 0;

        line-height: 1.6;
      }

      .correct-answer {
        color: #4ade80;

        margin-top: 12px;

        font-weight: bold;
      }

      .detail {
        margin-top: 15px;

        color: #cbd5e1;

        line-height: 1.8;
      }

      .section-title {
        margin-bottom: 20px;
      }

      /* ====================== */
      /* MOBILE NAV */
      /* ====================== */

      .mobile-nav {
        position: fixed;

        bottom: 0;
        left: 0;

        width: 100%;

        display: flex;

        gap: 12px;

        padding: 14px 16px calc(14px + env(safe-area-inset-bottom));

        background: linear-gradient(
          to top,
          rgba(15, 23, 42, 0.98),
          rgba(15, 23, 42, 0.88)
        );

        backdrop-filter: blur(12px);

        border-top: 1px solid rgba(255, 255, 255, 0.08);

        z-index: 999;
      }

      .mobile-nav-btn {
        flex: 1;

        border: none;

        height: 48px;

        border-radius: 16px;

        font-size: 14px;

        font-weight: bold;

        cursor: pointer;

        color: white;

        background: rgba(255, 255, 255, 0.08);

        transition: 0.2s;
      }

      .mobile-nav-btn:active {
        transform: scale(0.97);
      }

      .mobile-nav-btn.primary {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }

      @media (min-width: 900px) {
        .mobile-nav {
          width: auto;

          left: 50%;

          transform: translateX(-50%);

          bottom: 24px;

          border-radius: 22px;

          padding: 12px;

          background: rgba(15, 23, 42, 0.78);

          border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mobile-nav-btn {
          width: 180px;

          flex: unset;
        }
      }

      @media (max-width: 768px) {
        .container {
          padding: 10px;
        }

        .option-grid {
          grid-template-columns: 1fr;
        }

        .title h1 {
          font-size: 28px;
        }

        .title p {
          font-size: 14px;
        }

        .question {
          font-size: 20px;

          line-height: 1.45;

          margin-bottom: 14px;
        }

        .answer {
          font-size: 14px;

          padding: 12px 14px;

          border-radius: 14px;

          margin-bottom: 8px;
        }

        .card {
          padding: 14px;

          border-radius: 18px;
        }

        .topbar {
          gap: 8px;

          margin-bottom: 14px;
        }

        .badge {
          font-size: 12px;

          padding: 7px 12px;
        }

        .mobile-nav {
          gap: 10px;

          padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        }

        .mobile-nav-btn {
          height: 44px;

          font-size: 13px;

          border-radius: 14px;
        }

        .top-action-btn {
          padding: 10px 14px;

          font-size: 13px;
        }

        .hint {
          font-size: 13px;

          line-height: 1.5;
        }
      }
      /* ====================== */
      /* CLICKABLE */
      /* ====================== */

      .clickable {
        cursor: pointer;
      }

      /* ====================== */
      /* TOP ACTION */
      /* ====================== */

      .top-action-btn {
        border: none;

        background: rgba(239, 68, 68, 0.18);

        color: #fecaca;

        padding: 12px 18px;

        border-radius: 14px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.2s;

        backdrop-filter: blur(10px);
      }

      .top-action-btn:hover {
        background: rgba(239, 68, 68, 0.28);
      }

      .top-action-btn.submit {
        background: linear-gradient(135deg, #22c55e, #16a34a);

        color: white;
      }

      /* ====================== */
      /* QUESTION PANEL */
      /* ====================== */

      .question-panel {
        position: fixed;

        inset: 0;

        background: rgba(0, 0, 0, 0.6);

        z-index: 99999;

        display: flex;

        justify-content: center;
        align-items: center;

        padding: 20px;
      }

      .question-panel-content {
        width: 100%;

        max-width: 900px;

        max-height: 80vh;

        overflow: auto;

        background: linear-gradient(135deg, #1e293b, #334155);

        border-radius: 24px;

        padding: 24px;

        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .question-panel-header {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 20px;
      }

      .close-panel-btn {
        width: 42px;
        height: 42px;

        border-radius: 12px;

        border: none;

        background: rgba(255, 255, 255, 0.08);

        color: white;

        cursor: pointer;

        font-size: 18px;
      }

      .question-grid {
        display: grid;

        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));

        gap: 12px;
      }

      .question-item {
        height: 60px;

        border-radius: 16px;

        border: none;

        cursor: pointer;

        font-weight: bold;

        color: white;

        background: rgba(255, 255, 255, 0.08);

        transition: 0.2s;
      }

      .question-item:hover {
        transform: translateY(-2px);
      }

      .question-item.done {
        background: rgba(34, 197, 94, 0.35);

        border: 1px solid #22c55e;
      }

      .question-item.current {
        background: #3b82f6;
      }

      @media (max-width: 768px) {
        .question-grid {
          grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
        }

        .question-item {
          height: 52px;

          border-radius: 14px;
        }
      }
    </style>
